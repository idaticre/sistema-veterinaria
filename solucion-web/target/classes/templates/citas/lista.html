<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>📅 Lista de Citas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h2 {
            font-size: 24px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        a.button {
            display: inline-block;
            padding: 8px 14px;
            margin: 5px 5px 0 0;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        a.button.red {
            background-color: #e74c3c;
        }
        a.button.gray {
            background-color: #7f8c8d;
        }
    </style>
</head>
<body>

<h2>📅 Lista de Citas</h2>

<a th:href="@{/citas/nueva}" class="button">➕ Nueva Cita</a>


<table>
    <thead>
        <tr>
            <th>👤 Cliente</th>
            <th>🐶 Mascota</th>
            <th>💉 Servicio</th>
            <th>📆 Fecha</th>
            <th>⏰ Hora</th>
            <th>🕒 Duración</th>
            <th>📌 Estado</th>
            <th>📝 Observaciones</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="cita : ${citas}">
            <td th:text="${cita.cliente.nombres + ' ' + cita.cliente.apellidos}">Cliente</td>
            <td th:text="${cita.mascota.nombre}">Mascota</td>
            <td th:text="${cita.servicio.nombre}">Servicio</td>
            <td th:text="${cita.fecha}">Fecha</td>
            <td th:text="${cita.hora}">Hora</td>
            <td th:text="${cita.duracionEstimada + ' min'}">Duración</td>
            <td th:text="${cita.estado}">Estado</td>
            <td th:text="${cita.observaciones}">Observaciones</td>
        </tr>
        <tr th:if="${#lists.isEmpty(citas)}">
            <td colspan="8">❗ No hay citas registradas.</td>
        </tr>
    </tbody>
</table>

</body>
</html>
