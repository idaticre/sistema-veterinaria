<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>📬 CRM - Mensajería</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 30px;
        }

        .titulo {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tabla {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .tabla th, .tabla td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }

        .tabla th {
            background-color: #ecf0f1;
            color: #34495e;
        }

        .tabla tr:hover {
            background-color: #f2f6f9;
        }

        .acciones a {
            margin-right: 8px;
            font-size: 18px;
            text-decoration: none;
        }

        .btn-nuevo {
            padding: 10px 18px;
            background-color: #2980b9;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
        }
        .titulo {
    font-size: 24px;
    color: #2c3e50;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
}

.titulo span {
    flex-grow: 1;
    text-align: center;
    font-weight: bold;
}

    </style>
</head>
<body>
<div class="titulo">
    <a href="/" class="btn-nuevo" style="background-color: #8e44ad;">🏠 Volver</a>
    <span>📬 Seguimiento Post-Venta / CRM</span>
    <a href="/mensajeria/nuevo" class="btn-nuevo">➕ Nuevo Mensaje</a>
</div>



<table class="tabla">
    <thead>
    <tr>
        <th>👤 Cliente</th>
        <th>📞 Telefono</th>
        <th>🗓️ Fecha</th>
        <th>💬 Mensaje</th>
        <th>📌 Estado</th>
        <th>⚙️ Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="msg : ${mensajes}">
        <td th:text="${msg.cliente.nombre + ' ' + msg.cliente.apellido}">Nombre Cliente</td>
        <td th:text="${msg.canal.nombre}">Canal</td>
        <td th:text="${#temporals.format(msg.fecha, 'yyyy-MM-dd')}">Fecha</td>
        <td th:text="${msg.mensaje}">Contenido</td>
        <td th:text="${msg.estado}">Estado</td>
        <td class="acciones">
            <a th:href="@{'/crm_clientes/editar/' + ${msg.id}}" title="Editar">✏️</a>
            <a th:href="@{'/crm_clientes/eliminar/' + ${msg.id}}" onclick="return confirm('¿Eliminar mensaje?')" title="Eliminar">🗑️</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
