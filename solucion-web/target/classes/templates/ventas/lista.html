<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>📄 Lista de Ventas</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #3498db;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .acciones {
            margin-top: 20px;
            text-align: center;
        }

        .btn-nueva {
            background-color: #27ae60;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>📄 Ventas Registradas</h2>

    <div class="acciones">
        <a th:href="@{/ventas/nueva}" class="btn-nueva">➕ Nueva Venta</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>📅 Fecha</th>
            <th>👤 Cliente</th>
            <th>💳 Medio de Pago</th>
            <th>💰 Total</th>
            <th>📝 Observaciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="venta : ${ventas}">
            <td th:text="${venta.fechaFactura}">2025-07-01</td>
            <td th:text="${venta.cliente.nombre}">Cliente</td>
            <td th:text="${venta.medioPago.nombre}">Efectivo</td>
            <td th:text="${venta.total}">0.00</td>
            <td th:text="${venta.observaciones}">-</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
