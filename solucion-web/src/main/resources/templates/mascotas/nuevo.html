<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>➕ Nueva Mascota</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 30px;
        }

        .formulario {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        .acciones {
            margin-top: 25px;
            text-align: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin: 0 10px;
        }

        .btn-guardar {
            background-color: #27ae60;
            color: white;
        }

        .btn-cancelar {
            background-color: #bdc3c7;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="formulario">
        <h2>➕ Nueva Mascota</h2>
        <form th:action="@{/mascotas/guardar}" th:object="${mascota}" method="post">
            <label>Nombre</label>
            <input type="text" th:field="*{nombre}" required>

            <label>Raza</label>
            <input type="text" th:field="*{raza}" required>

            <label>Especie</label>
            <select th:field="*{especie}">
                <option value="Perro">Perro 🐶</option>
                <option value="Gato">Gato 🐱</option>
                <option value="Otro">Otro 🐾</option>
            </select>

            <label>Cliente</label>
            <select th:field="*{cliente.id}">
                <option th:each="cli : ${listaClientes}"
                        th:value="${cli.id}"
                        th:text="${cli.nombre + ' ' + cli.apellido}">
                </option>
            </select>

            <div class="acciones">
                <button type="submit" class="btn btn-guardar">💾 Guardar</button>
                <a th:href="@{/mascotas}" class="btn btn-cancelar">↩️ Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
