<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>📦 Caja Chica</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #3498db;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        form {
            margin-top: 30px;
            background-color: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #34495e;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .acciones {
            margin-top: 20px;
            text-align: center;
        }

        .acciones button,
        .acciones a {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            margin: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 15px;
        }

        .btn-guardar {
            background-color: #27ae60;
            color: white;
        }

        .btn-cancelar {
            background-color: #bdc3c7;
            color: black;
        }

        .btn-eliminar {
            color: white;
            background-color: #e74c3c;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container"> <!-- Comentario de ejemplo -->
    <h2>📦 Caja Chica</h2>

    <table>
        <thead>
        <tr>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Descripción</th>
            <th>Monto</th>
            <th>Saldo Inicial</th>
            <th>Saldo Final</th>
            <th>Observaciones</th>
            <th>🗑️</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="mov : ${movimientos}">
            <td th:text="${mov.fecha}"></td>
            <td th:text="${mov.tipoMovimiento}"></td>
            <td th:text="${mov.descripcion}"></td>
            <td th:text="${mov.monto}"></td>
            <td th:text="${mov.saldoInicial}"></td>
            <td th:text="${mov.saldoFinal}"></td>
            <td th:text="${mov.observaciones}"></td>
            <td>
                <a th:href="@{'/caja/eliminar/' + ${mov.id}}" class="btn-eliminar">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>

    <form th:action="@{/caja/guardar}" th:object="${nuevoMovimiento}" method="post">
        <label>📅 Fecha</label>
        <input type="date" th:field="*{fecha}" required/>

        <label>🔁 Tipo de Movimiento</label>
        <select th:field="*{tipoMovimiento}" required>
            <option value="">-- Selecciona --</option>
            <option value="INGRESO">Ingreso</option>
            <option value="EGRESO">Egreso</option>
        </select>

        <label>📝 Descripción</label>
        <input type="text" th:field="*{descripcion}" required/>

        <label>💰 Monto</label>
        <input type="number" th:field="*{monto}" step="0.01" required/>

        <label>💼 Saldo Inicial</label>
        <input type="number" th:field="*{saldoInicial}" step="0.01" required/>

        <label>💼 Saldo Final</label>
        <input type="number" th:field="*{saldoFinal}" step="0.01" required/>

        <label>🗒️ Observaciones</label>
        <textarea th:field="*{observaciones}" rows="2"></textarea>

        <div class="acciones">
            <button type="submit" class="btn-guardar">💾 Guardar</button>
            <a th:href="@{/}" class="btn-cancelar">↩️ Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
