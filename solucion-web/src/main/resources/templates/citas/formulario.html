<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>📋 Registrar Nueva Cita</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button, a.button {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            border: none;
            cursor: pointer;
        }

        button {
            background-color: #4CAF50;
        }

        a.button.cancel {
            background-color: #e74c3c;
        }
    </style>
</head>
<body>

<h2>🗓️ Registrar Nueva Cita</h2>

<form th:action="@{/citas/guardar}" th:object="${citaDTO}" method="post">

    <label>👤 Cliente:</label>
    <select th:field="*{idCliente}">
        <option value="" disabled selected>Seleccione un cliente</option>
        <option th:each="cliente : ${clientes}"
                th:value="${cliente.id}"
                th:text="${cliente.nombres + ' ' + cliente.apellidos}">Cliente</option>
    </select>

    <label>🐾 Mascota:</label>
    <select th:field="*{idMascota}">
        <option value="" disabled selected>Seleccione una mascota</option>
        <option th:each="mascota : ${mascotas}"
                th:value="${mascota.id}"
                th:text="${mascota.nombre}">Mascota</option>
    </select>

    <label>💉 Servicio:</label>
    <select th:field="*{idServicio}">
        <option value="" disabled selected>Seleccione un servicio</option>
        <option th:each="servicio : ${servicios}"
                th:value="${servicio.id}"
                th:text="${servicio.nombre}">Servicio</option>
    </select>

    <label>📅 Fecha:</label>
    <input type="date" th:field="*{fecha}" />

    <label>⏰ Hora:</label>
    <input type="time" th:field="*{hora}" />

    <label>🕒 Duración (min):</label>
    <input type="number" th:field="*{duracionEstimada}" />

    <label>📝 Observaciones:</label>
    <textarea th:field="*{observaciones}"></textarea>

    <div>
        <button type="submit">💾 Guardar</button>
        <a th:href="@{/}" class="button cancel">Cancelar</a>
    </div>
</form>

</body>
</html>
