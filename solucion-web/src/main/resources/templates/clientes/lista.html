<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>👥 Lista de Clientes</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 30px;
        }

        .titulo {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tabla {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .tabla th, .tabla td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }

        .tabla th {
            background-color: #ecf0f1;
            color: #34495e;
        }

        .tabla tr:hover {
            background-color: #f2f6f9;
        }

        .acciones a {
            margin-right: 8px;
            font-size: 18px;
            text-decoration: none;
        }

        .btn-nuevo {
            padding: 10px 18px;
            background-color: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
        }
        .titulo {
    font-size: 24px;
    color: #2c3e50;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
}

.titulo span {
    flex-grow: 1;
    text-align: center;
    font-weight: bold;
}

    </style>
</head>
<body>
<div class="titulo">
    <a href="/" class="btn-nuevo" style="background-color: #8e44ad;">🏠 Volver</a>
    <span>👥 Lista de Clientes</span>
    <a href="/clientes/nuevo" class="btn-nuevo">➕ Nuevo Cliente</a>
</div>


<table class="tabla">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre 👤</th>
            <th>DNI 🆔</th>
            <th>Teléfono 📞</th>
            <th>Email 📧</th>
            <th>Acciones ⚙️</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="c : ${clientes}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.nombre + ' ' + c.apellido}"></td>
            <td th:text="${c.dni}"></td>
            <td th:text="${c.telefono}"></td>
            <td th:text="${c.email}"></td>
            <td class="acciones">
                <a th:href="@{'/clientes/editar/' + ${c.id}}" title="Editar">✏️</a>
                <a th:href="@{'/clientes/eliminar/' + ${c.id}}" title="Eliminar"
                   onclick="return confirm('¿Eliminar este cliente?')">🗑️</a>
            </td>
        </tr>
    </tbody>
</table>
</body>
</html>
