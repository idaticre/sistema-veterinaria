<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Cliente</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .form-container {
            background-color: white;
            padding: 2rem;
            margin-top: 3rem;
            border-radius: 16px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
        }

        label {
            display: block;
            margin-top: 1rem;
            font-weight: bold;
            color: #444;
        }

        input {
            width: 100%;
            padding: 0.6rem;
            margin-top: 0.3rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        .btn-container {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
        }

        button, .btn-back {
            background-color: #3b82f6;
            color: white;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        button:hover, .btn-back:hover {
            background-color: #2563eb;
        }

        .emoji-label {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>📝 Registro de Cliente</h1>

        <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">

            <label class="emoji-label">👤 Nombre</label>
            <input type="text" th:field="*{nombre}" required />

            <label class="emoji-label">👥 Apellido</label>
            <input type="text" th:field="*{apellido}" required />

            <label class="emoji-label">📄 Tipo de Documento</label>
            <input type="text" th:field="*{tipoDocumento}" required />

            <label class="emoji-label">🔢 Número de Documento</label>
            <input type="text" th:field="*{numeroDocumento}" required />

            <label class="emoji-label">📞 Teléfono</label>
            <input type="text" th:field="*{telefono}" />

            <label class="emoji-label">📧 Correo</label>
            <input type="email" th:field="*{correo}" />

            <label class="emoji-label">🏠 Dirección</label>
            <input type="text" th:field="*{direccion}" />

            <div class="btn-container">
                <button type="submit">💾 Guardar</button>
                <a href="/clientes" class="btn-back">🔙 Volver a Lista</a>
            </div>
        </form>
    </div>

</body>
</html>
