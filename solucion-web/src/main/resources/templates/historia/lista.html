<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>📋 Historias Clínicas</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 30px;
        }

        .encabezado {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .btn {
            padding: 10px 18px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            color: white;
        }

        .btn-volver {
            background-color: #8e44ad;
        }

        .btn-nuevo {
            background-color: #27ae60;
        }

        .titulo-centro {
            flex-grow: 1;
            text-align: center;
            font-size: 26px;
            color: #2c3e50;
            font-weight: bold;
        }

        .tabla {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .tabla th, .tabla td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }

        .tabla th {
            background-color: #ecf0f1;
            color: #34495e;
        }

        .tabla tr:hover {
            background-color: #f2f6f9;
        }

        .acciones a {
            margin-right: 10px;
            font-size: 18px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="encabezado">
        <a href="/" class="btn btn-volver">🏠 Volver</a>
        <div class="titulo-centro">📋 Historias Clínicas</div>
        <a href="/historia/ingreso" class="btn btn-nuevo">➕ Nueva Entrada</a>
    </div>

    <table class="tabla">
        <thead>
            <tr>
                <th>ID</th>
                <th>Fecha 🗓</th>
                <th>Mascota 🐶</th>
                <th>Motivo 📋</th>
                <th>Veterinario 👨‍⚕️</th>
                <th>Acciones ⚙️</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="h : ${historias}">
                <td th:text="${h.id}">1</td>
                <td th:text="${h.fecha}">2025-07-08</td>
                <td th:text="${h.mascota.nombre}">Firulais</td>
                <td th:text="${h.motivoConsulta}">Vacunación</td>
                <td th:text="${h.colaborador.nombre}">Dr. López</td>
                <td class="acciones">
                    <a th:href="@{'/historia/detalle/' + ${h.id}}" title="Ver">🔍</a>
                    <a th:href="@{'/historia/eliminar/' + ${h.id}}" onclick="return confirm('¿Eliminar?')" title="Eliminar">🗑</a>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
