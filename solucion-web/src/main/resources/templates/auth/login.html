<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>🔐 Iniciar sesión</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24px;
        }

        label {
            display: block;
            margin-bottom: 15px;
            font-weight: bold;
            color: #34495e;
        }

        input {
            width: 90%;
            padding: 12px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        .mensaje-error {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 Iniciar Sesión</h1>

        <form method="post" action="/login">
            <label>👤 Usuario
                <input type="text" name="username" required />
            </label>

            <label>🔑 Contraseña
                <input type="password" name="password" required />
            </label>

            <button type="submit">➡️ Entrar</button>
        </form>

        <div th:if="${param.error}" class="mensaje-error">
            ❌ Credenciales incorrectas. Intenta nuevamente.
        </div>

        <div th:if="${param.logout}" class="mensaje-error" style="color:green;">
            ✅ Has cerrado sesión exitosamente.
        </div>
    </div>
</body>
</html>
