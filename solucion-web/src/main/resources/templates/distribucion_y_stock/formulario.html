<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Mascota</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .form-container {
            background-color: white;
            padding: 2rem;
            margin-top: 3rem;
            border-radius: 16px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
        }

        label {
            display: block;
            margin-top: 1rem;
            font-weight: bold;
            color: #444;
        }

        input, select {
            width: 100%;
            padding: 0.6rem;
            margin-top: 0.3rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        .btn-container {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
        }

        button, .btn-back {
            background-color: #3b82f6;
            color: white;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        button:hover, .btn-back:hover {
            background-color: #2563eb;
        }

        .emoji-label {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h1>🐾 Registro de Mascota</h1>

    <form th:action="@{/mascotas/guardar}" th:object="${mascota}" method="post">
        <input type="hidden" th:field="*{id}" />

        <label class="emoji-label">🐶 Nombre</label>
        <input type="text" th:field="*{nombre}" required />

        <label class="emoji-label">👤 Propietario</label>
        <select th:field="*{cliente.id}" required>
            <option value="">-- Seleccionar --</option>
            <option th:each="cliente : ${clientes}" th:value="${cliente.id}" th:text="${cliente.nombre}">Cliente</option>
        </select>

        <label class="emoji-label">🧬 Especie</label>
        <select th:field="*{especie.id}" required>
            <option value="">-- Seleccionar --</option>
            <option th:each="especie : ${especies}" th:value="${especie.id}" th:text="${especie.nombre}">Especie</option>
        </select>

        <label class="emoji-label">📅 Fecha de Nacimiento</label>
        <input type="date" th:field="*{fechaNacimiento}" required />

        <label class="emoji-label">⚖️ Peso (kg)</label>
        <input type="number" step="0.1" th:field="*{peso}" required />

        <div class="btn-container">
            <button type="submit">💾 Guardar</button>
            <a href="/mascotas" class="btn-back">🔙 Volver a Lista</a>
        </div>
    </form>
</div>

</body>
</html>
