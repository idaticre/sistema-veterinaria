<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>🏠 Dashboard - Veterinaria Woof</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            margin: 0;
            padding: 30px;
            background-color: #f4f6f8;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 40px;
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .card {
            width: 220px;
            background: #ffffff;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.12);
        }

        .emoji {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .card a {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            font-size: 16px;
            color: #2c3e50;
            font-weight: bold;
            border-radius: 8px;
            background-color: #ecf0f1;
            padding: 8px 14px;
            transition: background-color 0.2s;
        }

        .card a:hover {
            background-color: #dcdde1;
        }
    </style>
</head>
<body>
    <h1>📊 Panel Principal</h1>
    <div class="dashboard">
        <!-- Número 1: Clientes -->
        <div class="card">
            <div class="emoji">💰</div>
            <a href="/caja">Caja</a> <!-- Gestión de clientes -->
        </div>

        <!-- Número 2: Pacientes - Mascotas -->
        <div class="card">
            <div class="emoji">🐶</div>
            <a href="/mascotas">Mascotas</a>
        </div>

        <!-- Número 3: Historia clínica - Servicios -->
        <div class="card">
            <div class="emoji">📅</div>
            <a href="/citas">Citas</a> <!-- Servicios -->
        </div>

        <!-- Número 4: Agenda y Organización -->
        <div class="card">
            <div class="emoji">🛒</div>
            <a href="/ventas">Ventas</a> <!-- Agenda -->
        </div>

        <!-- Número 5: Mensajería (Post - Venta) -->
        <div class="card">
            <div class="emoji">🛒</div> 
            <a href="/crm_clientes">CRM clientes</a> 
        </div>

        <!-- Número 6: Ventas y Facturación -->
        <div class="card">
            <div class="emoji">🛒</div>
            <a href="/ventas_y_facturacion">Ventas y facturación</a> 
        </div>

        <!-- Número 7: Distribución/Stock -->
        <div class="card">
            <div class="emoji">🛒</div>
            <a href="/distribucion_y_stock">Distribución y stock</a> 
        </div>

        <!-- Número 8: Reportes e informes -->
        <div class="card">
            <div class="emoji">🛒</div>
            <a href="/reportes_e_informes">Reportes e informes</a> 
        </div>

        <!-- Número 9: Administración -->
        <div class="card">
            <div class="emoji">🛒</div>
            <a href="/administracion">Administración</a> 
        </div>

        <!-- Número 10: Seguridad y mantenimiento -->
        <div class="card">
            <div class="emoji">🛒</div>
            <a href="/seguridad_y_mantenimiento">Seguridad y mantenimiento</a> 
        </div>
    </div>
</body>
</html>
