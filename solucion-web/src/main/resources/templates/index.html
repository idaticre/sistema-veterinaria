<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>🏠 Dashboard - Veterinaria Woof</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            margin: 0;
            padding: 30px;
            background-color: #f4f6f8;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 40px;
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .card {
            width: 220px;
            background: #ffffff;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.12);
        }

        .emoji {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .card a {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            font-size: 16px;
            color: #2c3e50;
            font-weight: bold;
            border-radius: 8px;
            background-color: #ecf0f1;
            padding: 8px 14px;
            transition: background-color 0.2s;
        }

        .card a:hover {
            background-color: #dcdde1;
        }
    </style>
</head>
<body>
    <h1>📊 Panel Principal</h1>
    <div class="dashboard">
        <div class="card">
            <div class="emoji">💰</div>
            <a href="/caja">Caja Chica</a>
        </div>

        <div class="card">
            <div class="emoji">📅</div>
            <a href="/citas">Citas</a>
        </div>

        <div class="card">
            <div class="emoji">🐶</div>
            <a href="/mascotas">Mascotas</a>
        </div>

        <div class="card">
            <div class="emoji">🛒</div>
            <a href="/ventas">Ventas</a>
        </div>
    </div>
</body>
</html>
