<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${cita.id == null} ? '➕ Nueva Cita' : '✏️ Editar Cita'"></title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 40px;
        }

        .form-container {
            max-width: 600px;
            background-color: #ffffff;
            margin: auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 26px;
            color: #2c3e50;
        }

        label {
            display: block;
            margin-top: 20px;
            font-weight: bold;
            color: #34495e;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 15px;
        }

        .botones {
            margin-top: 30px;
            text-align: center;
        }

        .botones button,
        .botones a {
            text-decoration: none;
            padding: 12px 22px;
            font-size: 15px;
            border: none;
            border-radius: 12px;
            margin: 0 8px;
            cursor: pointer;
        }

        .btn-guardar {
            background-color: #27ae60;
            color: white;
        }

        .btn-cancelar {
            background-color: #bdc3c7;
            color: #2c3e50;
        }
    </style>
</head>
<body>
<div class="form-container">
    <h2 th:text="${cita.id == null} ? '➕ Nueva Cita' : '✏️ Editar Cita'"></h2>
    <form th:action="@{/agenda/guardar}" th:object="${cita}" method="post">

        <input type="hidden" th:field="*{id}" />

        <label>🐾 Mascota</label>
        <select th:field="*{mascota}" required>
            <option value="">-- Selecciona --</option>
            <option th:each="m : ${mascotas}" th:value="${m}" th:text="${m.nombre}"></option>
        </select>

        <label>👤 Cliente</label>
        <select th:field="*{cliente}" required>
            <option value="">-- Selecciona --</option>
            <option th:each="cli : ${clientes}" th:value="${cli}" th:text="${cli.nombre + ' ' + cli.apellido}"></option>
        </select>

        <label>📅 Fecha y hora</label>
        <input type="datetime-local" th:field="*{fechaHora}" required />

        <label>💬 Motivo</label>
        <textarea th:field="*{motivo}" rows="2"></textarea>

        <label>🧾 Estado</label>
        <input type="text" th:field="*{estado}" />

        <label>🏥 Sala</label>
        <input type="text" th:field="*{sala}" />

        <div class="botones">
            <button type="submit" class="btn-guardar">💾 Guardar</button>
            <a th:href="@{/agenda}" class="btn-cancelar">↩️ Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
