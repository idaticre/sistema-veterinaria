<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>📅 Lista de Citas</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 40px;
        }

        .titulo-completo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            margin-bottom: 30px;
        }

        .titulo-centro {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 26px;
            color: #2c3e50;
            margin: 0;
        }

        .boton {
            padding: 10px 18px;
            background-color: #2980b9;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        .boton:hover {
            background-color: #1f618d;
        }

        .boton-izquierdo {
            background-color: #8e44ad;
        }

        .boton-derecho {
            background-color: #27ae60;
        }

        table.tabla {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        table.tabla th, table.tabla td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #e6e9ed;
        }

        table.tabla th {
            background-color: #ecf0f1;
            color: #2c3e50;
            font-weight: bold;
        }

        table.tabla tr:hover {
            background-color: #f9fcff;
        }

        .acciones a {
            font-size: 18px;
            margin-right: 10px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="titulo-completo">
    <a href="/" class="boton boton-izquierdo">🏠 VOLVER</a>
    <h2 class="titulo-centro">📅 Lista de Citas</h2>
    <a href="/agenda/nueva" class="boton boton-derecho">➕ Nueva Cita</a>
</div>

<table class="tabla">
    <thead>
        <tr>
            <th>🆔 ID</th>
            <th>🐾 Mascota</th>
            <th>👤 Cliente</th>
            <th>📅 Fecha</th>
            <th>🕒 Hora</th>
            <th>🗓️ Fecha (fechaHora)</th>
            <th>⏰ Hora (fechaHora)</th>
            <th>💬 Motivo</th>
            <th>⚙️ Acciones</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="cita : ${citas}">
            <td th:text="${cita.id}"></td>
            <td th:text="${cita.mascota.nombre}"></td>
            <td th:text="${cita.cliente.nombre + ' ' + cita.cliente.apellido}"></td>
            <td th:text="${cita.fecha}"></td>
            <td th:text="${cita.hora}"></td>
            <td th:text="${#temporals.format(cita.fechaHora, 'yyyy-MM-dd')}"></td>
            <td th:text="${#temporals.format(cita.fechaHora, 'HH:mm')}"></td>
            <td th:text="${cita.motivo}"></td>
            <td class="acciones">
                <a th:href="@{'/agenda/editar/' + ${cita.id}}">✏️</a>
                <a th:href="@{'/agenda/eliminar/' + ${cita.id}}" onclick="return confirm('¿Eliminar esta cita?')">🗑️</a>
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>
