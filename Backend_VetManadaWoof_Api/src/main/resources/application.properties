# ===============================
# Configuración general
# ===============================
spring.application.name=VetManadaWoof
server.port=${SERVER_PORT:8088}
server.servlet.context-path=/

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===============================
# Configuración de la base de datos
# ===============================
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# Configuración de JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}

# Excluir seguridad automática (si no usas Spring Security todavía)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration


# Excluir seguridad automática (si no usas Spring Security todavía)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
# ===============================
# Variables de entorno recomendadas para producción
# ===============================
# Ejemplo de cómo deberías definirlas en tu servidor/hosting:
#
# SERVER_PORT=8088
# JWT_SECRET=tuClaveSuperSeguraYMasLarga2025!
# JWT_EXPIRATION_MS=86400000
# DATASOURCE_URL=jdbc:mysql://tu-servidor.com:3306/vet_manada_woof?useSSL=true&serverTimezone=UTC
# DATASOURCE_USERNAME=usuario_produccion
# DATASOURCE_PASSWORD=contraseña_muy_segura
# HIBERNATE_DDL_AUTO=update    # o "validate" en prod estricta
# SHOW_SQL=false
# FORMAT_SQL=false